      - heading "RAG — Retrieval-Augmented Generation" [level=1] [ref=e127]
      - paragraph [ref=e128]: RAG is a technique that gives an AI model access to external knowledge before generating a response.
      - paragraph [ref=e129]: Instead of relying only on what the model learned during training, RAG retrieves relevant documents or data at the moment of the query and uses them as context.
      - separator [ref=e130]
      - heading "The Problem RAG Solves" [level=2] [ref=e131]
      - table [ref=e132]:
        - rowgroup [ref=e133]:
          - row "Limitation What happens without RAG" [ref=e134]:
            - columnheader "Limitation" [ref=e135]
            - columnheader "What happens without RAG" [ref=e136]
        - rowgroup [ref=e137]:
          - row "Knowledge cutoff The model only knows what existed when it was trained" [ref=e138]:
            - cell "Knowledge cutoff" [ref=e139]:
              - strong [ref=e140]: Knowledge cutoff
            - cell "The model only knows what existed when it was trained" [ref=e141]
          - row "Private data The model has no access to internal docs, tickets, or databases" [ref=e142]:
            - cell "Private data" [ref=e143]:
              - strong [ref=e144]: Private data
            - cell "The model has no access to internal docs, tickets, or databases" [ref=e145]
          - row "Hallucination Without grounding, the model invents plausible-sounding answers" [ref=e146]:
            - cell "Hallucination" [ref=e147]:
              - strong [ref=e148]: Hallucination
            - cell "Without grounding, the model invents plausible-sounding answers" [ref=e149]
          - row "Scale You cannot fine-tune a model every time your data changes" [ref=e150]:
            - cell "Scale" [ref=e151]:
              - strong [ref=e152]: Scale
            - cell "You cannot fine-tune a model every time your data changes" [ref=e153]
      - paragraph [ref=e154]: RAG solves all four by connecting the model to a live, searchable knowledge base at query time.
      - separator [ref=e155]
      - heading "How It Works" [level=2] [ref=e156]
      - code [ref=e158]: User query ↓ 1. RETRIEVE — search a knowledge base for relevant chunks ↓ 2. AUGMENT — inject those chunks into the prompt as context ↓ 3. GENERATE — the model answers using the retrieved content ↓ Response grounded in real data
      - paragraph [ref=e159]: The model does not search the internet. It searches a pre-built index of documents you control.
